<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path
    d="M16 2L4 7v8c0 6.5 5.2 12.5 12 14 6.8-1.5 12-7.5 12-14V7L16 2z"
    fill="url(#shieldGrad)"
  />

  <!-- Inner shield glow border -->
  <path
    d="M16 4.5L6 8.8v6.2c0 5.2 4.2 10 10 11.5 5.8-1.5 10-6.3 10-11.5V8.8L16 4.5z"
    fill="none"
    stroke="rgba(255,255,255,0.2)"
    stroke-width="0.8"
  />

  <!-- Lock body -->
  <rect x="11.5" y="17" width="9" height="7" rx="1.5" fill="url(#lockGrad)"/>

  <!-- Lock shackle -->
  <path
    d="M13.5 17v-2.5a2.5 2.5 0 0 1 5 0V17"
    stroke="url(#lockGrad)"
    stroke-width="2"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Lock keyhole -->
  <circle cx="16" cy="20.5" r="1.2" fill="#7c3aed"/>
  <rect x="15.4" y="20.5" width="1.2" height="2" rx="0.3" fill="#7c3aed"/>
</svg>
